<!DOCTYPE html>
<html>
<head>
  <title>Nova ES Support Reply</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #005fcc;
    }
  </style>
</head>
<body>

  <h2>Reply to Ticket</h2>

  <label>User Email</label>
  <input id="email" type="email" placeholder="user@example.com">

  <label>Ticket ID</label>
  <input id="ticketID" type="text" placeholder="NES-123456">

  <label>Your Reply Message</label>
  <textarea id="replyMessage" rows="6" placeholder="Type your reply..."></textarea>

  <button onclick="sendReply()">Send Reply</button>

  <p id="status"></p>

  <script>
    async function sendReply() {
      const email = document.getElementById("email").value;
      const ticketID = document.getElementById("ticketID").value;
      const replyMessage = document.getElementById("replyMessage").value;

      const res = await fetch("/api/reply.js", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, ticketID, replyMessage })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById("status").innerText = "Reply sent successfully!";
      } else {
        document.getElementById("status").innerText = "Error: " + data.error;
      }
    }
  </script>

</body>
</html>
